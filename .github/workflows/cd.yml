name: CD - Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  IMAGE_NAME: ${{ vars.DOCKER_IMAGE_NAME || format('{0}/finvibe-profit-worker', secrets.DOCKERHUB_USERNAME) }}
  CONTAINER_NAME: ${{ vars.DEPLOY_CONTAINER_NAME || 'finvibe-profit-worker' }}
  LOG_DIR_HOST: ${{ vars.LOG_DIR_HOST || '' }}
  PRIMARY_DOCKER_NETWORK: ${{ vars.PRIMARY_DOCKER_NETWORK || 'infra_bridge' }}
  SECONDARY_DOCKER_NETWORK: ${{ vars.SECONDARY_DOCKER_NETWORK || '' }}

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest
            type=raw,value=${{ github.sha }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.0
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
          IMAGE_NAME: ${{ env.IMAGE_NAME }}
          CONTAINER_NAME: ${{ env.CONTAINER_NAME }}
          LOG_DIR_HOST: ${{ env.LOG_DIR_HOST }}
          PRIMARY_DOCKER_NETWORK: ${{ env.PRIMARY_DOCKER_NETWORK }}
          SECONDARY_DOCKER_NETWORK: ${{ env.SECONDARY_DOCKER_NETWORK }}
          IMAGE_TAG: ${{ github.sha }}
          REDIS_HOST: ${{ secrets.REDIS_HOST }}
          REDIS_PORT: ${{ secrets.REDIS_PORT }}
          REDIS_PASSWORD: ${{ secrets.REDIS_PASSWORD }}
          KAFKA_BOOTSTRAP_SERVERS: ${{ secrets.KAFKA_BOOTSTRAP_SERVERS }}
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT }}
          envs: DOCKERHUB_USERNAME,DOCKERHUB_TOKEN,IMAGE_NAME,CONTAINER_NAME,LOG_DIR_HOST,PRIMARY_DOCKER_NETWORK,SECONDARY_DOCKER_NETWORK,IMAGE_TAG,REDIS_HOST,REDIS_PORT,REDIS_PASSWORD,KAFKA_BOOTSTRAP_SERVERS
          script_stop: true
          script: |
            set -eu

            required_vars="REDIS_HOST REDIS_PORT KAFKA_BOOTSTRAP_SERVERS"
            for var_name in ${required_vars}; do
              eval "var_value=\${${var_name}:-}"
              if [ -z "${var_value}" ]; then
                echo "Required deployment variable is missing: ${var_name}"
                exit 1
              fi
            done

            if [ -z "${LOG_DIR_HOST}" ]; then
              LOG_DIR_HOST="$HOME/finvibe-profit-worker/logs"
            fi

            IMAGE_REF="${IMAGE_NAME}:${IMAGE_TAG}"

            mkdir -p "${LOG_DIR_HOST}"

            echo "${DOCKERHUB_TOKEN}" | docker login -u "${DOCKERHUB_USERNAME}" --password-stdin
            docker pull "${IMAGE_REF}"

            docker network inspect "${PRIMARY_DOCKER_NETWORK}" >/dev/null 2>&1 || {
              echo "Primary docker network not found: ${PRIMARY_DOCKER_NETWORK}"
              exit 1
            }

            if docker ps -a --format '{{.Names}}' | grep -Eq "^${CONTAINER_NAME}\$"; then
              docker rm -f "${CONTAINER_NAME}"
            fi

            docker run -d \
              --name "${CONTAINER_NAME}" \
              --restart unless-stopped \
              --network "${PRIMARY_DOCKER_NETWORK}" \
              --memory 512m \
              -e SPRING_PROFILES_ACTIVE=prod \
              -e REDIS_HOST="${REDIS_HOST}" \
              -e REDIS_PORT="${REDIS_PORT}" \
              -e REDIS_PASSWORD="${REDIS_PASSWORD}" \
              -e KAFKA_BOOTSTRAP_SERVERS="${KAFKA_BOOTSTRAP_SERVERS}" \
              -v "${LOG_DIR_HOST}:/app/logs" \
              "${IMAGE_REF}"

            if [ -n "${SECONDARY_DOCKER_NETWORK}" ]; then
              docker network inspect "${SECONDARY_DOCKER_NETWORK}" >/dev/null 2>&1 || {
                echo "Secondary docker network not found: ${SECONDARY_DOCKER_NETWORK}"
                exit 1
              }

              if ! docker network connect "${SECONDARY_DOCKER_NETWORK}" "${CONTAINER_NAME}"; then
                echo "Failed to connect container to secondary network"
                docker logs "${CONTAINER_NAME}" || true
                exit 1
              fi
            fi

            for i in $(seq 1 12); do
              if ! docker ps --format '{{.Names}}' | grep -Eq "^${CONTAINER_NAME}\$"; then
                echo "Container exited during startup"
                docker logs "${CONTAINER_NAME}" || true
                exit 1
              fi

              health_status="$(docker inspect --format '{{if .State.Health}}{{.State.Health.Status}}{{else}}none{{end}}' "${CONTAINER_NAME}")"
              if [ "${health_status}" = "healthy" ] || [ "${health_status}" = "none" ]; then
                echo "Deployment healthy"
                exit 0
              fi

              echo "Waiting for container health (${i}/12)..."
              sleep 5
            done

            echo "Container did not become healthy in time"
            docker logs "${CONTAINER_NAME}" || true
            exit 1
